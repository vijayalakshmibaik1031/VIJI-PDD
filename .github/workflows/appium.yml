name: Appium Test Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  appium-test:
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      CI: "true"
      HEADLESS: "true"
      API_URL: http://127.0.0.1:5000
      APPIUM_PORT: 4725
      TIMEOUT_MS: 15000
      DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install web-admin dependencies
        working-directory: web-admin
        run: npm install

      - name: Install appium test dependencies
        working-directory: appium-tests
        run: npm install

      - name: Build web-admin
        working-directory: web-admin
        run: npm run build

      - name: Start backend and preview frontend
        shell: pwsh
        run: |
          $backendPath = (Resolve-Path "backend").Path
          $webPath = (Resolve-Path "web-admin").Path

          $backend = Start-Process -FilePath "node" -ArgumentList "server.js" -WorkingDirectory $backendPath -PassThru
          $frontend = Start-Process -FilePath "npx" -ArgumentList "vite preview --host 127.0.0.1 --port 5173 --strictPort" -WorkingDirectory $webPath -PassThru

          node -e "async function wait(url, label) { for (let i = 0; i < 60; i += 1) { try { const res = await fetch(url); if (res.ok) { console.log(label + ' ready'); return; } } catch (err) {} await new Promise((resolve) => setTimeout(resolve, 2000)); } throw new Error(label + ' did not become ready'); } (async () => { await wait('http://127.0.0.1:5000/', 'Backend'); await wait('http://127.0.0.1:5173/', 'Frontend'); })().catch((err) => { console.error(err.message); process.exit(1); });"

      - name: Wait for services to be ready
        run: npx wait-on http://127.0.0.1:5000 http://127.0.0.1:5173 --timeout 300000
        shell: bash

      - name: Run Appium tests
        working-directory: appium-tests
        continue-on-error: true
        run: |
          node run-tests.js

      - name: Upload Appium artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-artifacts
          path: |
            appium-tests/reports/
            appium-tests/allure-results/
          if-no-files-found: warn
