name: Selenium E2E Tests (selenium-tests.yml)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: selenium-tests/package-lock.json

      - name: Install selenium test dependencies
        working-directory: selenium-tests
        run: npm ci

      - name: Run Selenium Tests
        working-directory: selenium-tests
        env:
          MOCK_E2E: "true"
        run: npm run test:headless

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-report
          path: |
            selenium-tests/reports/*.xlsx
          if-no-files-found: warn
