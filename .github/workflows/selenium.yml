name: Selenium E2E Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selenium-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: facilitydesk
          POSTGRES_PASSWORD: facilitydesk
          POSTGRES_DB: facilitydesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U facilitydesk -d facilitydesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      HEADLESS: "true"
      BASE_URL: http://127.0.0.1:5173
      API_URL: http://127.0.0.1:5000
      PORT: 5000
      HOST: 0.0.0.0
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: facilitydesk
      PGPASSWORD: facilitydesk
      PGDATABASE: facilitydesk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install web-admin dependencies
        working-directory: web-admin
        run: npm install

      - name: Install selenium test dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Build web-admin
        working-directory: web-admin
        run: npm run build

      - name: Start backend and web preview
        shell: bash
        run: |
          # Backend
          cd backend
          nohup node server.js > ../backend.log 2>&1 &
          cd ..

          # Frontend (web-admin)
          cd web-admin
          nohup npm run preview -- --host 127.0.0.1 --port 5173 --strictPort > ../frontend.log 2>&1 &
          cd ..

          # Wait for services to be ready
          echo "Waiting for backend, frontend and DB..."
          for i in {1..30}; do
            curl -s http://127.0.0.1:5000/ && break || sleep 2
          done
          for i in {1..30}; do
            curl -s http://127.0.0.1:5173/ && break || sleep 2
          done
          for i in {1..30}; do
            curl -s http://127.0.0.1:5000/test-db && break || sleep 2
          done
          echo "All services ready"

      - name: Run Selenium tests
        working-directory: selenium-tests
        run: npm run test:headless

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-report
          path: |
            selenium-tests/reports/*.xlsx
          if-no-files-found: warn
