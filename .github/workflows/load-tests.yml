name: Load Tests (load-tests.yml)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-load-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: facilitydesk
          POSTGRES_PASSWORD: facilitydesk
          POSTGRES_DB: facilitydesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U facilitydesk -d facilitydesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      PORT: 5000
      HOST: 0.0.0.0
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: facilitydesk
      PGPASSWORD: facilitydesk
      PGDATABASE: facilitydesk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            appium-tests/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install appium-tests dependencies (for ExcelJS)
        working-directory: appium-tests
        run: npm ci

      - name: Install load test dependencies
        working-directory: "load test"
        run: npm install

      - name: Start backend server
        shell: bash
        run: |
          cd backend
          nohup node server.js > ../backend.log 2>&1 &
          cd ..

      - name: Wait for backend to be ready
        shell: bash
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            curl -s http://127.0.0.1:5000/ && break || sleep 2
          done
          for i in {1..30}; do
            curl -s http://127.0.0.1:5000/test-db && break || sleep 2
          done
          echo "Backend is ready"

      - name: Run Load Test
        working-directory: "load test"
        env:
          LOAD_BASE_URL: http://127.0.0.1:5000
          LOAD_USERS: 50
          LOAD_DURATION_SECONDS: 30
        run: npm run run

      - name: Generate Load Test Report
        working-directory: "load test"
        run: npm run report

      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: |
            load test/reports/
          if-no-files-found: warn
