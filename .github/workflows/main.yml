name: Reports

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-reports:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      CI: "true"
      HEADLESS: "true"
      BASE_URL: http://127.0.0.1:5173
      API_URL: http://127.0.0.1:5000
      PORT: 5000
      DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install web-admin dependencies
        working-directory: web-admin
        run: npm install

      - name: Install selenium test dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Install Appium test dependencies
        working-directory: appium-tests
        run: npm install

      - name: Install vulnerability report dependencies
        working-directory: "Vulnerability Test Results"
        run: npm install

      - name: Build web-admin
        working-directory: web-admin
        run: npm run build

      - name: Start backend and web preview
        shell: pwsh
        run: |
          $backendPath = (Resolve-Path "backend").Path
          $webPath = (Resolve-Path "web-admin").Path

          $backend = Start-Process -FilePath "node" -ArgumentList "server.js" -WorkingDirectory $backendPath -PassThru
          $frontend = Start-Process -FilePath "npx" -ArgumentList "vite preview --host 127.0.0.1 --port 5173 --strictPort" -WorkingDirectory $webPath -PassThru

          node -e "async function wait(url, label) { for (let i = 0; i < 60; i += 1) { try { const res = await fetch(url); if (res.ok) { console.log(label + ' ready'); return; } } catch (err) {} await new Promise((resolve) => setTimeout(resolve, 2000)); } throw new Error(label + ' did not become ready'); } (async () => { await wait('http://127.0.0.1:5000/', 'Backend'); await wait('http://127.0.0.1:5173/', 'Frontend'); })().catch((err) => { console.error(err.message); process.exit(1); });"

      - name: Wait for services to be ready
        run: npx wait-on http://127.0.0.1:5000 http://127.0.0.1:5173 http://127.0.0.1:5000/test-db --timeout 300000
        shell: bash

      - name: Run Selenium tests
        working-directory: selenium-tests
        env:
          HEADLESS: "true"
        run: npm run report

      - name: Run Appium tests
        working-directory: appium-tests
        run: node run-direct.js

      - name: Generate vulnerability report
        working-directory: "Vulnerability Test Results"
        continue-on-error: true
        run: node generate-excel.js

      - name: Upload Selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-reports
          path: |
            selenium-tests/reports/
          if-no-files-found: warn

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: |
            Vulnerability Test Results/*.xlsx
          if-no-files-found: warn

      - name: Upload Appium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-reports
          path: |
            appium-tests/reports/
          if-no-files-found: warn
